<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dart Spin</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8f2e6;
      color: #15202b;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      box-sizing: border-box;
    }

    main {
      max-width: 680px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 8vw, 72px);
      line-height: 1;
    }

    p {
      margin: 0 auto;
      max-width: 520px;
      font-size: 18px;
      line-height: 1.55;
      color: #44515d;
    }

    .target {
      width: 132px;
      height: 132px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background:
        radial-gradient(circle, #f8f2e6 0 13%, #172331 14% 27%, #f8f2e6 28% 42%, #7f919b 43% 58%, #f8f2e6 59% 73%, #172331 74% 100%);
      box-shadow: 0 18px 40px rgba(21, 32, 43, 0.18);
    }
  </style>
</head>
<body>
  <main>
    <div class="target" aria-hidden="true"></div>
    <h1>Dart Spin</h1>
    <p>Casual dart spin arcade game. Throw, time, and master the rotating target.</p>
  </main>
</body>
</html>
